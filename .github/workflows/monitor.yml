name: Website Monitor

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Enable manual triggers

permissions:
  contents: write # Required to commit state files back to the repository

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitoring script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUBLIC_TARGET_URL: ${{ secrets.PUBLIC_TARGET_URL }}
        run: python monitor.py

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Add state files if they exist/changed
          git add state_public.txt 2>/dev/null || true
          # Commit only if there are changes to commit, otherwise exit cleanly
          if ! git diff --cached --quiet; then
            git commit -m "Update monitor state baseline [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
