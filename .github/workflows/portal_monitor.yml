name: Portal Monitor

on:
  schedule:
    # Run every 5 hours (00:00, 05:00, 10:00, 15:00, 20:00)
    - cron: '0 */5 * * *'
  workflow_dispatch: # Enable manual triggers

permissions:
  contents: write # Required to commit state files back to the repository

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitoring script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTAL_LOGIN_URL: ${{ secrets.PORTAL_LOGIN_URL }}
          PORTAL_TARGET_URL: ${{ secrets.PORTAL_TARGET_URL }}
          PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          PORTAL_USERNAME_FIELD: ${{ secrets.PORTAL_USERNAME_FIELD }}
          PORTAL_PASSWORD_FIELD: ${{ secrets.PORTAL_PASSWORD_FIELD }}
          PORTAL_PAYLOAD_FORMAT: ${{ secrets.PORTAL_PAYLOAD_FORMAT }}
        run: python monitor.py --portal

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state_portal.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Update portal baseline state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
